<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headphones Landing Page</title>
    <link rel="stylesheet" href="3-styles.css">
    <link rel="stylesheet" href="holberton_school-icon/style.css"> <!-- Font Icons -->
</head>
<body>
    <header class="hero">
        <div class="hero-container">
            <h1>Experience the Best Sound Quality</h1>
            <p>Immerse yourself in the purest sound experience with our top-notch headphones.</p>
            <a href="#" class="btn">Shop Now</a>
        </div>
    </header>

    <section class="contact">
        <h2>Contact Us</h2>
        <p>Have any questions? Get in touch!</p>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Write your message..." required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>
</body>
</html>
